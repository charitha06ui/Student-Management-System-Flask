{% extends "base.html" %}

{% block title %}
Dashboard
{% endblock %}

{% block content %}

<div class="text-center mb-5">

    <h1 class="fw-bold">
        <i class="bi bi-speedometer2 me-2"></i>
        Dashboard
    </h1>

    <p class="text-muted fs-5">
        Welcome Admin
    </p>

    <p class="text-secondary">
        Student Management System Overview
    </p>

</div>

<div class="row g-4">

    <!-- Total Students -->
    <div class="col-lg-4 col-md-6">

        <div class="card shadow-lg border-0 rounded-4 h-100">

            <div class="card-body text-center py-5">

                <i class="bi bi-people-fill text-primary"
                   style="font-size:60px;"></i>

                <h5 class="mt-3 fw-bold">
                    Total Students
                </h5>

                <h1 class="display-4 fw-bold text-primary">
                    {{ total_students }}
                </h1>

            </div>

        </div>

    </div>

    <!-- Male Students -->
    <div class="col-lg-4 col-md-6">

        <div class="card shadow-lg border-0 rounded-4 h-100">

            <div class="card-body text-center py-5">

                <i class="bi bi-person-fill text-success"
                   style="font-size:60px;"></i>

                <h5 class="mt-3 fw-bold">
                    Male Students
                </h5>

                <h1 class="display-4 fw-bold text-success">
                    {{ male_students }}
                </h1>

            </div>

        </div>

    </div>

    <!-- Female Students -->
    <div class="col-lg-4 col-md-6">

        <div class="card shadow-lg border-0 rounded-4 h-100">

            <div class="card-body text-center py-5">

                <i class="bi bi-person-fill text-danger"
                   style="font-size:60px;"></i>

                <h5 class="mt-3 fw-bold">
                    Female Students
                </h5>

                <h1 class="display-4 fw-bold text-danger">
                    {{ female_students }}
                </h1>

            </div>

        </div>

    </div>

</div>

{% endblock %}
